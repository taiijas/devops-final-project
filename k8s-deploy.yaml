apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-final-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-final-app
  template:
    metadata:
      labels:
        app: devops-final-app
    spec:
      containers:
      - name: final-app-container
        image: taiijas/devops-final-project:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-final-service
spec:
  type: NodePort
  selector:
    app: devops-final-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001
